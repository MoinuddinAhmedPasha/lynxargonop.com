  <!-- Script: Firebase + Razorpay logic + country/currency handling -->
  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    // ---------- FIREBASE CONFIG ----------
    const firebaseConfig = {
      apiKey: "AIzaSyAQjsPZrFASy1qimq6cNh8WFAALDwXNUjk",
      authDomain: "lynxargonop.firebaseapp.com",
      projectId: "lynxargonop",
      storageBucket: "lynxargonop.firebasestorage.app",
      messagingSenderId: "416015678061",
      appId: "1:416015678061:web:3d65fb425a2614a7465d64",
      measurementId: "G-78L0PFVRSP"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ---------- RAZORPAY KEY (LIVE as requested) ----------
    const RAZORPAY_KEY_ID = "rzp_live_RfCriOFrwAKHdO";

    // ---------- Product base amounts ----------
    const INR_PRICE = 1299;        // INR (for India)
    const USD_PRICE_MAIN = 60;     // For USD / GBP / EUR regions (50 in their currency)
    const USD_PRICE_REST = 50;     // For rest-of-world base: $40 converted to local currency

    // ---------- currency exponent handling ----------
    // Many currencies have 2 decimal places (exponent 2). Some use 0 or 3.
    // We keep lists for 0-decimal and 3-decimal currencies; default exponent = 2.
    const ZERO_EXP_CURRENCIES = new Set([
      "BIF","CLP","DJF","GNF","ISK","JPY","KMF","PYG","RWF","UGX","VND","VUV","XAF","XOF","XPF"
    ]);
    const THREE_EXP_CURRENCIES = new Set([
      "BHD","IQD","JOD","KWD","OMR","TND"
    ]);
    function minorUnitMultiplier(curr) {
      if (ZERO_EXP_CURRENCIES.has(curr)) return 1;
      if (THREE_EXP_CURRENCIES.has(curr)) return 1000;
      return 100; // default: 2 decimal places
    }

    // ---------- UI elements ----------
    const displayPriceEl = document.getElementById('displayPrice');
    const buyBtn = document.getElementById('buyBtn');
    const checkoutModal = document.getElementById('checkoutModal');
    const closeModal = document.getElementById('closeModal');
    const cancelOrder = document.getElementById('cancelOrder');
    const checkoutForm = document.getElementById('checkoutForm');
    const formMsg = document.getElementById('formMsg');

    closeModal.addEventListener('click', () => checkoutModal.classList.add('hidden'));
    cancelOrder.addEventListener('click', () => checkoutModal.classList.add('hidden'));

    // Hold current pricing context to use during checkout
    let pricingContext = {
      country: "India",
      currency: "INR",
      displayAmount: INR_PRICE, // number
      amountMinor: INR_PRICE * 100, // integer minor units (default)
      formatted: `₹${INR_PRICE}`
    };

    // util: format currency nicely
    function formatCurrency(amountNumber, currencyCode) {
      try {
        // amountNumber is numeric (major unit)
        return new Intl.NumberFormat(undefined, { style: 'currency', currency: currencyCode, maximumFractionDigits: 2 }).format(amountNumber);
      } catch (e) {
        // Fallback
        return currencyCode + ' ' + amountNumber;
      }
    }

    // Fetch visitor info (country & currency) and set pricing
    async function determinePricingAndDisplay() {
      try {
        const r = await fetch('https://ipapi.co/json/');
        if (!r.ok) throw new Error('ipapi error');
        const info = await r.json();
        const visitorCountry = info.country_name || "India";
        const visitorCurrency = info.currency || "INR"; // ipapi typically returns 'currency'
        // Normalize codes for some edge cases:
        const cur = visitorCurrency.toUpperCase();

        let displayMajor = INR_PRICE;
        let currencyCode = "INR";

        if (cur === "INR" || info.country === "IN") {
          // India: fixed INR
          currencyCode = "INR";
          displayMajor = INR_PRICE;
        } else if (cur === "USD" || cur === "EUR" || cur === "GBP") {
          // If visitor's currency is one of USD/EUR/GBP, charge 50 in that currency
          currencyCode = cur;
          displayMajor = USD_PRICE_MAIN; // 50 in their currency
        } else {
          // Rest of world: convert $40 to their local currency (from USD)
          currencyCode = cur || "USD";
          // fetch conversion
          try {
            const convResp = await fetch(`https://api.exchangerate.host/convert?from=USD&to=${encodeURIComponent(currencyCode)}&amount=${USD_PRICE_REST}`);
            if (convResp.ok) {
              const convJson = await convResp.json();
              if (convJson && typeof convJson.result === 'number') {
                // convJson.result is the major-unit amount in visitor currency
                displayMajor = Number(convJson.result.toFixed(2));
              } else {
                // fallback: use USD 40 and set currency to USD
                currencyCode = "USD";
                displayMajor = USD_PRICE_REST;
              }
            } else {
              // fallback
              currencyCode = "USD";
              displayMajor = USD_PRICE_REST;
            }
          } catch (err) {
            currencyCode = "USD";
            displayMajor = USD_PRICE_REST;
          }
        }

        // compute minor units according to currency exponent
        const multiplier = minorUnitMultiplier(currencyCode);
        // Round carefully: compute minor amount as integer = Math.round(displayMajor * multiplier)
        // Do digit-by-digit style safe calculation
        const minor = Math.round((displayMajor * multiplier) + 0.0000001);

        // format string for display
        const formatted = formatCurrency(displayMajor, currencyCode);

        // Update global context
        pricingContext = {
          country: visitorCountry,
          currency: currencyCode,
          displayAmount: displayMajor,
          amountMinor: minor,
          formatted
        };

        // Update UI
        displayPriceEl.textContent = formatted;

      } catch (err) {
        // On error, fallback to INR
        pricingContext = {
          country: "India",
          currency: "INR",
          displayAmount: INR_PRICE,
          amountMinor: INR_PRICE * 100,
          formatted: `₹${INR_PRICE}`
        };
        displayPriceEl.textContent = pricingContext.formatted;
        console.warn("Pricing detection failed, falling back to INR:", err);
      }
    }

    // Initialize pricing right away
    determinePricingAndDisplay();

    // ---------- Open modal on buy ----------
    buyBtn.addEventListener('click', () => {
      formMsg.textContent = "";
      // ensure displayed currency is set before opening modal (in case ip fetch was still running)
      // (if not ready yet, a short wait)
      if (!pricingContext || !pricingContext.currency) {
        formMsg.textContent = "Detecting your location and currency... please wait a moment and click again.";
        return;
      }
      checkoutModal.classList.remove('hidden');
      setTimeout(()=> checkoutModal.querySelector('input[name="name"]').focus(), 120);
    });

    // ---------- Form submit and Razorpay checkout ----------
    checkoutForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      formMsg.textContent = "Saving order...";
      const data = Object.fromEntries(new FormData(checkoutForm).entries());

      // Build order doc using the chosen pricing context
      const orderDoc = {
        productId: "hoodie-high-on-cocaine",
        title: "High On Cocaine Hoodie",
        price_major: pricingContext.displayAmount,
        currency: pricingContext.currency,
        price_minor: pricingContext.amountMinor,
        size: data.size,
        customer: {
          name: data.name,
          phone: data.phone,
          address_line1: data.line1,
          address_line2: data.line2,
          city: data.city,
          postal: data.postal,
          country: data.country || pricingContext.country
        },
        status: "created",
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };

      try {
        // Save draft order to Firestore
        const docRef = await db.collection('orders').add(orderDoc);
        formMsg.textContent = "Opening secure Razorpay checkout...";

        // Razorpay options (charging in user's currency)
        const options = {
          key: RAZORPAY_KEY_ID,
          amount: pricingContext.amountMinor, // integer in minor units
          currency: pricingContext.currency,   // currency code
          name: "Lynx Argon Op",
          description: "High On Cocaine Hoodie",
          image: "/images/dp.jpg",
          // order_id: "", // ideally generated server-side via Orders API for verification
          prefill: {
            name: data.name || "",
            contact: data.phone || ""
          },
          notes: {
            firestore_order_id: docRef.id,
            size: data.size,
            price_major: pricingContext.displayAmount,
            currency: pricingContext.currency
          },
          theme: {
            color: "#6366f1"
          },
          handler: async function (response) {
            try {
              // mark order as paid in Firestore
              await db.collection('orders').doc(docRef.id).update({
                status: "paid",
                paymentId: response.razorpay_payment_id,
                signature: response.razorpay_signature,
                paidAt: firebase.firestore.FieldValue.serverTimestamp(),
                paid_currency: pricingContext.currency,
                paid_amount_minor: pricingContext.amountMinor,
                paid_amount_major: pricingContext.displayAmount
              });
              formMsg.textContent = "";
              checkoutModal.classList.add('hidden');
              alert("Payment successful! Thank you — your order is placed.");
            } catch (err) {
              console.error("Error updating order after payment:", err);
              formMsg.textContent = "Payment succeeded but there was an error saving the payment. We'll contact you.";
            }
          },
          modal: {
            ondismiss: function() {
              formMsg.textContent = "Payment popup closed. Your order is still saved and pending payment.";
            }
          }
        };

        const rzp = new Razorpay(options);
        rzp.open();

      } catch (err) {
        console.error("Order save / checkout error:", err);
        formMsg.textContent = "Could not create order. Try again.";
      }
    });

  </script>
