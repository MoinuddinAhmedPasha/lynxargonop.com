    --rose:#ff4d82;
    --rose-soft:#ff8fb5;
    --violet:#a855e0;
    --gold:#eec888;
    --gold-deep:#c99a4c;
    --glass:rgba(255,255,255,0.045);

  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}

  .bg-gradient{

    animation:breathGlow 24s infinite alternate ease-in-out;z-index:0;

  .subtitle{
    font-size:clamp(0.98rem,3.6vw,1.28rem);color:var(--ink-dim);font-family:'Playfair Display',serif;font-style:italic;

  }

  .card::after{

  .reason-number{font-family:'Playfair Display',serif;font-size:0.82rem;color:var(--ink-faint);font-style:italic;margin-top:0.15rem;letter-spacing:0.4px;}
  .reason-text{

  .controls{width:100%;display:flex;flex-direction:column;align-items:center;gap:0.55rem;padding-bottom:0.2rem;}

  .chapter-progress{display:flex;gap:4px;width:78%;max-width:320px;}
  .chapter-seg{flex:1;height:3px;border-radius:4px;background:rgba(255,255,255,0.08);overflow:hidden;position:relative;}

  .btn-nav{

  @keyframes popIn{0%{transform:translate(-50%,-50%) scale(0.4);opacity:0;}100%{transform:translate(-50%,-50%) scale(1);opacity:1;}}
  @keyframes fadeInUp{0%{opacity:0;transform:translateY(12px);}100%{opacity:1;transform:translateY(0);}}

  @media (max-width:480px){

</style>
</head>

    { chapter: "Chapter 100 – Endless Love", text: "Because no matter how many reasons I list, my love for you is infinite and cannot be quantified. You are my forever, Nabeena." }
  ];

  const totalCards = reasonsData.length;
  const startDate = new Date('2023-02-05T00:00:00');
  let currentIndex = 0;

  // ---- derive chapter groups for segmented progress ----
  const chapterGroups = [];
  reasonsData.forEach((r, i) => {
    const last = chapterGroups[chapterGroups.length - 1];
    if (!last || last.name !== r.chapter) chapterGroups.push({ name: r.chapter, start: i, end: i });
    else last.end = i;
  });

  function buildChapterProgress() {
    const wrap = document.getElementById('chapterProgress');
    wrap.innerHTML = '';
    chapterGroups.forEach(() => {
      const seg = document.createElement('div');
      seg.className = 'chapter-seg';
      seg.innerHTML = '<div class="fill"></div>';
      wrap.appendChild(seg);
    });
  }

  function updateChapterProgress() {
    const segs = document.querySelectorAll('.chapter-seg');
    chapterGroups.forEach((g, gi) => {
      const seg = segs[gi];
      const fill = seg.querySelector('.fill');
      if (currentIndex > g.end) { fill.style.width = '100%'; }
      else if (currentIndex < g.start) { fill.style.width = '0%'; }
      else {
        const span = g.end - g.start + 1;
        const progressed = currentIndex - g.start + 1;
        fill.style.width = `${(progressed / span) * 100}%`;
      }
    });
  }

  function updateTimer() {
    const diff = new Date() - startDate;
    document.getElementById('days').innerText = Math.floor(diff / 86400000);
    document.getElementById('hours').innerText = String(Math.floor((diff / 3600000) % 24)).padStart(2, '0');
    document.getElementById('minutes').innerText = String(Math.floor((diff / 60000) % 60)).padStart(2, '0');
    document.getElementById('seconds').innerText = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');
  }

  // ---- carousel ----
  const carousel = document.getElementById('carousel');
  let dragX = 0, dragging = false, startX = 0, startY = 0, axisLocked = null, cardEls = [];

  function initCarousel() {
    cardEls = reasonsData.map((reason, index) => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-top">
          <div class="chapter-divider"><span class="line"></span><span class="chapter-title">${reason.chapter}</span><span class="line r"></span></div>
          <div class="reason-number">No. ${String(index + 1).padStart(3, '0')}</div>
        </div>
        <div class="reason-text">${reason.text}</div>
        <div class="reason-emoji">❤️</div>
      `;
      carousel.appendChild(card);
      return card;
    });
    renderStack(true);
  }

  function cardTransform(offset, drag) {
    // offset: position relative to current (-1, 0, 1, ...)
    const d = drag / 260; // normalized drag influence
    const pos = offset + d;
    const abs = Math.min(Math.abs(pos), 2.4);
    const x = pos * 92;
    const scale = 1 - abs * 0.14;
    const rotY = pos * -14;
    const rotX = Math.max(0, abs * 5);
    const z = -abs * 140;
    const opacity = Math.max(0, 1 - abs * 0.62);
    return { x, scale, rotY, rotX, z, opacity, abs };
  }

  function renderStack(instant) {
    cardEls.forEach((card, i) => {
      const offset = i - currentIndex;
      if (Math.abs(offset) > 2 && !dragging) {
        card.style.opacity = '0';
        card.style.pointerEvents = 'none';
        card.classList.remove('animate');
        return;
      }
      const t = cardTransform(offset, dragging ? dragX : 0);
      card.classList.toggle('animate', !dragging);
      card.style.transform = `translate3d(${t.x}px,0,${t.z}px) scale(${t.scale}) rotateY(${t.rotY}deg) rotateX(${t.rotX}deg)`;
      card.style.opacity = String(t.opacity);
      card.style.zIndex = String(100 - Math.round(t.abs * 10));
      card.style.pointerEvents = offset === 0 ? 'auto' : 'none';
    });
  }

  function updateUI() {
    renderStack(false);
    updateChapterProgress();
    document.getElementById('progress-text').innerText = `${currentIndex + 1} / ${totalCards}`;
    const p = document.getElementById('btn-prev');
    p.style.opacity = currentIndex === 0 ? '0.25' : '1';
    p.style.pointerEvents = currentIndex === 0 ? 'none' : 'auto';
    const isLast = currentIndex === totalCards - 1;
    document.getElementById('btn-next').style.display = isLast ? 'none' : 'flex';
    document.getElementById('btn-secret').style.display = isLast ? 'inline-block' : 'none';
  }

  function nextCard() { if (currentIndex < totalCards - 1) { currentIndex++; updateUI(); buzz(8); } }
  function prevCard() { if (currentIndex > 0) { currentIndex--; updateUI(); buzz(8); } }
  function buzz(ms) { if (navigator.vibrate) navigator.vibrate(ms); }

  // ---- pointer-driven drag (unifies touch + mouse) ----
  carousel.addEventListener('pointerdown', e => {
    if (e.target.closest('.btn-nav')) return;
    dragging = true; axisLocked = null; dragX = 0;
    startX = e.clientX; startY = e.clientY;
    carousel.setPointerCapture(e.pointerId);
  });
  carousel.addEventListener('pointermove', e => {
    if (!dragging) return;
    const dx = e.clientX - startX, dy = e.clientY - startY;
    if (axisLocked === null && (Math.abs(dx) > 6 || Math.abs(dy) > 6)) {
      axisLocked = Math.abs(dx) > Math.abs(dy) ? 'x' : 'y';
    }
    if (axisLocked === 'y') return;
    dragX = dx;
    // rubber-band at the ends
    if ((currentIndex === 0 && dragX > 0) || (currentIndex === totalCards - 1 && dragX < 0)) {
      dragX *= 0.35;
    }
    renderStack(false);
  });
  function endDrag(e) {
    if (!dragging) return;
    dragging = false;
    if (axisLocked === 'x') {
      const threshold = 70;
      if (dragX < -threshold) nextCard();
      else if (dragX > threshold) prevCard();
      else { dragX = 0; renderStack(false); }
    } else {
      dragX = 0; renderStack(false);
    }
  }
  carousel.addEventListener('pointerup', endDrag);
  carousel.addEventListener('pointercancel', endDrag);
  carousel.addEventListener('pointerleave', e => { if (dragging && e.buttons === 0) endDrag(e); });

  document.addEventListener('keydown', e => {
    if (document.getElementById('app').style.display === 'none') return;
    if (e.key === 'ArrowRight') nextCard();
    if (e.key === 'ArrowLeft') prevCard();
  });

  function startJourney() {
    document.getElementById('landing').style.opacity = '0';
    setTimeout(() => {
      document.getElementById('landing').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'flex';
      buildChapterProgress();
      setTimeout(() => {
        app.style.opacity = '1';
        initCarousel();
        updateUI();
        updateTimer();
        setInterval(updateTimer, 1000);
        startCanvas();
      }, 80);
    }, 850);
  }

  function restartAll() {
    document.getElementById('final-msg').style.display = 'none';
    document.getElementById('letter-modal').style.display = 'none';
    currentIndex = 0;
    updateUI();
  }

  // ---- ambient canvas particles ----
  const canvas = document.getElementById('bg-canvas'), ctx = canvas.getContext('2d');
  let particles = [], w, h;
  function resizeCanvas() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
  window.addEventListener('resize', resizeCanvas); resizeCanvas();

  class Particle {
    constructor(x, y, isHeart) {
      this.x = x ?? Math.random() * w;
      this.y = y ?? h + Math.random() * 50;
      this.size = isHeart ? Math.random() * 6 + 3 : Math.random() * 2.4 + 0.8;
      this.speedY = Math.random() * 0.55 + 0.28;
      this.speedX = (Math.random() - 0.5) * 0.35;
      this.isHeart = isHeart;
    }
    update() { this.y -= this.speedY; this.x += this.speedX; if (this.y < -40) this.y = h + 40; }
    draw() {
      ctx.fillStyle = this.isHeart ? '#ff3b7a' : '#ff8fb5';
      ctx.globalAlpha = this.isHeart ? 0.42 : 0.26;
      if (this.isHeart) {
        ctx.save(); ctx.translate(this.x, this.y); ctx.scale(this.size / 16, this.size / 16);
        ctx.beginPath(); ctx.moveTo(10, 6); ctx.quadraticCurveTo(10, 0, 15, 0); ctx.quadraticCurveTo(20, 0, 20, 6);
        ctx.quadraticCurveTo(20, 12, 10, 20); ctx.quadraticCurveTo(0, 12, 0, 6); ctx.quadraticCurveTo(0, 0, 5, 0);
        ctx.quadraticCurveTo(10, 0, 10, 6); ctx.fill(); ctx.restore();
      } else { ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); }
    }
  }
  let rafId;
  function startCanvas() {
    particles = [];
    for (let i = 0; i < 26; i++) particles.push(new Particle());
    for (let i = 0; i < 9; i++) particles.push(new Particle(null, null, true));
    cancelAnimationFrame(rafId);
    const animate = () => { ctx.clearRect(0, 0, w, h); particles.forEach(p => { p.update(); p.draw(); }); rafId = requestAnimationFrame(animate); };
    animate();
  }

  // ---- letter ----
  const letterText = `My Dearest Nabeena,\n\nIf you are reading this, you've journeyed through 100 reasons why I love you. Yet 100 is only a beginning.\n\nYou have brought light, joy, and meaning into my life since February 5, 2023. Every moment with you is precious.\n\nThank you for being you. I love you endlessly.\n\nForever yours`;
  let letterIndex = 0, typingTimer = null;
  function typeWriter() {
    const el = document.getElementById('typewriter');
    if (letterIndex < letterText.length) {
      el.innerHTML += letterText.charAt(letterIndex) === '\n' ? '<br>' : letterText.charAt(letterIndex);
      letterIndex++;
      typingTimer = setTimeout(typeWriter, 32);
    } else {
      typingTimer = setTimeout(finalCelebration, 1200);
    }
  }
  function revealLetter() {
    document.getElementById('letter-modal').style.display = 'flex';
    document.getElementById('typewriter').innerHTML = '';
    letterIndex = 0;
    clearTimeout(typingTimer);
    typingTimer = setTimeout(typeWriter, 250);
  }
  function closeLetter() {
    clearTimeout(typingTimer);
    document.getElementById('letter-modal').style.display = 'none';
  }
  function finalCelebration() {
    document.getElementById('letter-modal').style.display = 'none';
    document.getElementById('final-msg').style.display = 'block';
    const flash = document.createElement('div');
    flash.style.cssText = 'position:fixed;inset:0;background:#fff;z-index:199;opacity:0.55;transition:opacity 0.8s;pointer-events:none;';
    document.body.appendChild(flash);
    requestAnimationFrame(() => { flash.style.opacity = '0'; setTimeout(() => flash.remove(), 800); });
    buzz([200, 100, 200]);
    const end = Date.now() + 8000;
    (function burst() {
      if (Date.now() > end) return;
      confetti({ particleCount: 55, spread: 68, origin: { x: Math.random(), y: Math.random() * 0.3 } });
      setTimeout(burst, 260);
    })();
  }
