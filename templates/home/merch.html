<script>
  document.getElementById('year').textContent = new Date().getFullYear();

  const prices = document.querySelectorAll(".price");

  function format(amount, cur){
    try { return new Intl.NumberFormat(undefined,{style:"currency",currency:cur}).format(amount); }
    catch { return cur + " " + amount; }
  }

  async function updatePrices(){
    if (!prices.length) return;

    try {
      const r = await fetch('https://ipapi.co/json/');
      const info = await r.json();
      const cur = info.currency || "INR";

      prices.forEach(async (p) => {
        const INR = Number(p.dataset.inr);
        const USD_MAIN = Number(p.dataset.usdMain);
        const USD_REST = Number(p.dataset.usdRest);

        let price = INR;
        let curr = "INR";

        if (cur === "INR" || info.country === "IN") {
          curr = "INR";
          price = INR;
        }
        else if (["USD","EUR","GBP"].includes(cur)) {
          curr = cur;
          price = USD_MAIN;
        }
        else {
          curr = cur;
          try {
            const rr = await fetch(`https://api.exchangerate.host/convert?from=USD&to=${curr}&amount=${USD_REST}`);
            const data = await rr.json();
            price = Number(data.result?.toFixed(2)) || USD_REST;
          } catch {
            curr = "USD";
            price = USD_REST;
          }
        }

        p.textContent = format(price, curr);
      });

    } catch {
      prices.forEach(p => {
        p.textContent = `₹${p.dataset.inr}`;
      });
    }
  }

  updatePrices();
</script>
