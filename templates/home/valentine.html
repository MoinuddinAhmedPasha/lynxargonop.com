<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>For Someone Special ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#ff758c,#ff7eb3);
overflow:hidden;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
width:15px;
height:15px;
background:white;
transform:rotate(45deg);
animation:float 7s linear infinite;
opacity:.7;
}

.heart:before,
.heart:after{
content:'';
position:absolute;
width:15px;
height:15px;
background:white;
border-radius:50%;
}

.heart:before{top:-7px;}
.heart:after{left:-7px;}

@keyframes float{
0%{transform:translateY(0) rotate(45deg);}
100%{transform:translateY(-120vh) rotate(45deg);}
}

/* card */

.card{
width:90%;
max-width:420px;
padding:40px 25px;
text-align:center;
border-radius:25px;
background: rgba(255,255,255,0.15);
backdrop-filter: blur(18px);
color:white;
box-shadow:0 10px 40px rgba(0,0,0,.2);
animation:fade 1.5s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(30px);}
to{opacity:1;}
}

h1{
font-family:'Great Vibes',cursive;
font-size:48px;
margin-bottom:10px;
}

p{
font-size:18px;
margin-bottom:30px;
}

button{
border:none;
padding:15px 28px;
border-radius:40px;
background:white;
color:#ff4e88;
font-weight:600;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.07);
}

</style>
</head>

<body>

<div class="card">

<h1>Hey Beautiful ❤️</h1>

<p>
I made something special for you...  
Tap here to read my mind 
</p>

<button onclick="openPage()">Open 💌</button>

</div>

<script>

function openPage(){
window.location.href="letter.html";
}

/* floating hearts generator */

setInterval(()=>{

const heart=document.createElement("div");
heart.classList.add("heart");
heart.style.left=Math.random()*100+"vw";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),7000);

},400);

</script>

</body>
</html>
