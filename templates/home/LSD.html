<!doctype html>
<html lang="en">

<head>

<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>

<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#020617">

<title>Lynx Argon Op</title>

<!-- Libraries -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>
<script src="/ads.js"></script>

<!-- Monetag Ad Script -->
<script>
(function(s){
  s.dataset.zone = "10840637";
  s.src = "https://nap5k.com/tag.min.js";
  (document.head || document.documentElement).appendChild(s);
})(document.createElement('script'));
</script>

<style>

body{
margin:0;
color:#e2e8f0;
font-family:Poppins,sans-serif;
overflow:hidden;
background:#020617;
}

/* 🔥 BIG AD SPACE */
.top-ad-space{
position:fixed;
top:0;
left:0;
right:0;
height:200px;
z-index:998;
background:rgba(2,6,23,0.9);
backdrop-filter:blur(8px);
border-bottom:1px solid rgba(56,189,248,0.2);
}

/* BACKGROUND */
#three-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

/* CONTENT */
.app-content{
position:fixed;
top:200px;
bottom:120px;
left:0;
right:0;
overflow-y:auto;
padding:20px;
}

/* VIDEO CARD */
.video-card{
margin-bottom:20px;
padding:15px;
background:rgba(15,23,42,0.6);
border-radius:20px;
box-shadow:0 6px 25px rgba(0,0,0,0.6);
border:1px solid rgba(56,189,248,0.2);
}

.video-wrapper{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:15px;
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* BUTTONS */
.subscribe-btn{
display:inline-block;
background:linear-gradient(135deg,#ef4444,#dc2626);
padding:12px 18px;
border-radius:15px;
color:white;
font-weight:600;
text-decoration:none;
margin-top:10px;
}

.watch-ad-btn{
background:linear-gradient(135deg,#f59e0b,#f97316);
border:none;
padding:12px 18px;
border-radius:15px;
color:white;
font-weight:600;
margin-top:10px;
cursor:pointer;
}

/* GRID */
.feature-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.feature-card{
display:flex;
justify-content:center;
align-items:center;
height:100px;
border-radius:20px;
color:white;
}

.red{background:#ef4444;}
.indigo{background:#6366f1;}
.green{background:#10b981;}
.purple{background:#a855f7;}

</style>
</head>

<body>

<!-- 🔥 TOP AD SPACE -->
<div class="top-ad-space"></div>

<div id="three-bg"></div>

<div class="app-content">

<!-- 🎬 VIDEO SECTION -->
<div class="video-card">

<h2 style="color:#38bdf8;">🔥 Watch My Latest Video</h2>

<div class="video-wrapper">
<iframe src="https://www.youtube.com/embed/j3k0EveKzzg" allowfullscreen></iframe>
</div>

<div style="text-align:center;">
<a href="https://yt.openinapp.co/l7b08" target="_blank" class="subscribe-btn">
🔴 Subscribe to My Channel
</a>

<br>

<button onclick="watchAd()" class="watch-ad-btn">
🎯 Watch Ads
</button>
</div>

</div>


<script>

function watchAd(){
window.open("https://omg10.com/4/10840874","_blank");
}

/* simple background */
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth,window.innerHeight);
document.getElementById("three-bg").appendChild(renderer.domElement);

camera.position.z=50;

function animate(){
requestAnimationFrame(animate);
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
